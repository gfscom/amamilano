name: Issue assignment

on:
    issues:
        types: [opened]

permissions:
  contents: read

jobs:
    auto-assign:
        runs-on: ubuntu-latest
        steps:
            - name: 'Auto-assign issue'
              uses: pozil/auto-assign-issue@v3.0.0
              with:
                  assignees: gioxx
                  numOfAssignee: 1
                  allowSelfAssign: true
